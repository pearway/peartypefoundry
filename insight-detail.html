<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Font Insight — Pear Type Foundry</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">

  <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>

  <style>
    :root {
      --bg: #0A0A09;
      --ink: #FCFCFA;
      --ink-2: #E8E6DF;
      --muted: #5C5A55;
      --muted-2: #8A8782;
      --hover: #6B8AFF;
      --line: rgba(252, 252, 250, 0.08);

      --en: 'Geist', sans-serif;
      --mono: 'Geist Mono', monospace;
      --kr: 'Pretendard', sans-serif;

      --pad: 40px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    html.lenis-smooth { scroll-behavior: auto; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--en);
      font-weight: 400;
      line-height: 1.5;
      overflow-x: hidden;
      letter-spacing: -0.012em;
    }

    .kr { font-family: var(--kr); letter-spacing: -0.02em; }
    .mono { font-family: var(--mono); letter-spacing: 0; }

    a { color: inherit; text-decoration: none; transition: color 0.3s ease; }
    a:hover { color: var(--hover); }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 24px var(--pad);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      background: rgba(10, 10, 9, 0.85);
      backdrop-filter: blur(16px) saturate(150%);
      -webkit-backdrop-filter: blur(16px) saturate(150%);
      border-bottom: 1px solid var(--line);
    }

    .logo {
      font-family: var(--en);
      font-weight: 500;
      font-size: 15px;
      letter-spacing: -0.02em;
    }

    .logo .small {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted-2);
      margin-left: 8px;
      font-weight: 400;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      font-family: var(--kr);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    /* SCROLL REVEAL */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }

    /* HEADER */
    .detail-header {
      padding: 140px var(--pad) 60px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .breadcrumb {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted-2);
      margin-bottom: 60px;
      display: flex;
      gap: 12px;
      align-items: center;
      letter-spacing: 0.05em;
    }

    .chapter-tag {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted-2);
      letter-spacing: 0.1em;
      margin-bottom: 32px;
    }

    .detail-title {
      font-family: var(--kr);
      font-weight: 200;
      font-size: clamp(40px, 7vw, 96px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      margin-bottom: 24px;
    }

    .detail-subtitle {
      font-family: var(--kr);
      font-weight: 300;
      font-size: clamp(18px, 1.6vw, 22px);
      line-height: 1.55;
      color: var(--ink-2);
      max-width: 720px;
      letter-spacing: -0.02em;
      margin-bottom: 60px;
    }

    .detail-meta {
      display: flex;
      gap: 32px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted-2);
      letter-spacing: 0.05em;
    }

    /* COVER (PDF preview image) */
    .cover-section {
      padding: 60px var(--pad) 100px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .cover-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #050504;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--line);
    }

    .cover-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cover-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(252, 252, 250, 0.5);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      gap: 16px;
    }

    .cover-fallback .big {
      font-size: clamp(80px, 10vw, 160px);
      color: #FCFCFA;
      font-weight: 400;
      letter-spacing: -0.04em;
      line-height: 0.9;
    }

    /* CONTENT BODY */
    .body-content {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 var(--pad) 100px;
    }

    .body-content h2 {
      font-family: var(--kr);
      font-weight: 200;
      font-size: clamp(36px, 5vw, 64px);
      letter-spacing: -0.04em;
      margin: 120px 0 32px;
      line-height: 1;
      padding-top: 32px;
      border-top: 1px solid var(--line);
    }

    .body-content h2:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .body-content h3 {
      font-family: var(--mono);
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--ink);
      text-transform: uppercase;
      margin: 56px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }

    .body-content p {
      font-family: var(--kr);
      font-size: 16px;
      line-height: 1.8;
      color: var(--ink-2);
      letter-spacing: -0.01em;
      margin-bottom: 20px;
    }

    .body-content p strong {
      color: var(--ink);
      font-weight: 500;
    }

    .body-content ul, .body-content ol {
      font-family: var(--kr);
      font-size: 15px;
      line-height: 1.8;
      color: var(--ink-2);
      letter-spacing: -0.01em;
      margin-bottom: 20px;
      padding-left: 0;
      list-style: none;
    }

    .body-content li {
      margin-bottom: 12px;
      padding-left: 24px;
      position: relative;
    }

    .body-content ul li::before {
      content: "—";
      position: absolute;
      left: 0;
      color: var(--muted-2);
    }

    .body-content ol {
      counter-reset: item;
    }

    .body-content ol li {
      counter-increment: item;
    }

    .body-content ol li::before {
      content: "0" counter(item);
      position: absolute;
      left: 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted-2);
      top: 4px;
    }

    .body-content blockquote {
      border-left: 1px solid var(--ink);
      padding: 8px 0 8px 24px;
      margin: 48px 0;
      font-family: var(--kr);
      font-weight: 200;
      font-size: clamp(22px, 2.5vw, 28px);
      line-height: 1.4;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .body-content blockquote .source {
      display: block;
      margin-top: 16px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      color: var(--muted-2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* DOWNLOAD CTA */
    .download-section {
      background: #050504;
      color: var(--ink);
      padding: 100px var(--pad);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .download-content {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }

    .download-tag {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted-2);
      letter-spacing: 0.1em;
      margin-bottom: 24px;
    }

    .download-statement {
      font-family: var(--kr);
      font-weight: 200;
      font-size: clamp(28px, 3.5vw, 48px);
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .download-statement .accent {
      color: var(--muted-2);
    }

    .download-action {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .download-meta {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted-2);
      letter-spacing: 0.05em;
    }

    .download-button {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 24px 32px;
      background: #FCFCFA;
      color: #0A0A09;
      font-family: var(--kr);
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.02em;
      border-radius: 8px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .download-button:hover {
      background: var(--hover);
      color: #FCFCFA;
    }

    .download-button.disabled {
      background: rgba(252, 252, 250, 0.1);
      color: rgba(252, 252, 250, 0.4);
      pointer-events: none;
    }

    .download-button .arrow {
      transition: transform 0.3s ease;
    }

    .download-button:hover .arrow { transform: translateY(2px); }

    /* OTHER CHAPTERS */
    .other-chapters {
      max-width: 1200px;
      margin: 0 auto;
      padding: 100px var(--pad);
      border-top: 1px solid var(--line);
    }

    .other-chapters h3 {
      font-family: var(--kr);
      font-weight: 300;
      font-size: 24px;
      letter-spacing: -0.02em;
      margin-bottom: 40px;
    }

    .other-list {
      display: flex;
      flex-direction: column;
    }

    .other-item {
      padding: 32px 0;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 60px 1fr 100px;
      gap: 24px;
      align-items: baseline;
      transition: padding 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .other-item:last-child { border-bottom: 1px solid var(--line); }
    .other-item:hover { padding-left: 12px; }

    .other-num {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted-2);
      letter-spacing: 0.05em;
    }

    .other-title {
      font-family: var(--kr);
      font-weight: 400;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .other-arrow {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted-2);
      text-align: right;
      letter-spacing: 0.05em;
    }

    /* FOOTER */
    footer {
      padding: 60px var(--pad) 32px;
      border-top: 1px solid var(--line);
    }

    .footer-grid {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 40px;
      margin-bottom: 60px;
    }

    .footer-brand {
      font-family: var(--en);
      font-weight: 500;
      font-size: 15px;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .footer-tag {
      font-family: var(--en);
      font-weight: 400;
      font-size: 13px;
      color: var(--muted-2);
      max-width: 280px;
      line-height: 1.6;
      letter-spacing: -0.012em;
    }

    .footer-col h4 {
      font-family: var(--kr);
      font-weight: 500;
      font-size: 13px;
      color: var(--muted-2);
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .footer-col ul { list-style: none; }
    .footer-col li {
      margin-bottom: 8px;
      font-family: var(--kr);
      font-size: 14px;
    }

    .footer-bottom {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted-2);
      gap: 24px;
      flex-wrap: wrap;
    }

    .footer-business {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted-2);
      letter-spacing: 0;
      line-height: 1.7;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      :root { --pad: 20px; }
      nav { padding: 16px 20px; }
      .logo .small { display: none; }
      .nav-links { gap: 16px; font-size: 13px; }
      .nav-links a:nth-child(2) { display: none; }

      .detail-header { padding: 100px 20px 40px; }
      .detail-meta { gap: 16px; flex-wrap: wrap; }
      .cover-section { padding: 40px 20px 60px; }
      .body-content { padding: 0 20px 60px; }

      .download-section { padding: 60px 20px; }
      .download-content { grid-template-columns: 1fr; gap: 32px; }

      .other-chapters { padding: 60px 20px; }
      .other-item { grid-template-columns: 40px 1fr 60px; gap: 16px; padding: 24px 0; }

      .footer-grid { grid-template-columns: 1fr 1fr; margin-bottom: 32px; }
      .footer-brand-col { grid-column: 1 / -1; }
      .footer-bottom { flex-direction: column; gap: 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1 !important; transform: none !important; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">
      Pear Type Foundry<span class="small">PTF</span>
    </a>
    <div class="nav-links">
      <a href="index.html#type">폰트</a>
      <a href="index.html#graphic">그래픽</a>
      <a href="insight.html">인사이트</a>
      <a href="index.html#contact">문의</a>
    </div>
  </nav>

  <main id="content"></main>

  <footer>
    <div class="footer-grid">
      <div class="footer-brand-col">
        <div class="footer-brand">Pear Type Foundry</div>
        <p class="footer-tag" id="footerTag">Pear Type Foundry. Seoul, 2026.</p>
      </div>

      <div class="footer-col">
        <h4>폰트</h4>
        <ul id="footerFonts"></ul>
      </div>

      <div class="footer-col">
        <h4>스튜디오</h4>
        <ul>
          <li><a href="https://pearway.kr" target="_blank" rel="noopener">Pearway 브랜딩 ↗</a></li>
          <li><a href="index.html#graphic">그래픽</a></li>
          <li><a href="insight.html">인사이트</a></li>
          <li><a href="index.html#custom">의뢰</a></li>
        </ul>
      </div>

      <div class="footer-col">
        <h4>연결</h4>
        <ul id="footerConnect"></ul>
      </div>
    </div>

    <div class="footer-bottom">
      <div class="footer-business" id="footerBusiness">
        © 2026 PEAR TYPE FOUNDRY · SEOUL, KR<br>
        CEO LEE HEEBAE · BIZ REG. 515-11-75407
      </div>
      <span>Type Foundry · Seoul</span>
    </div>
  </footer>

  <script>
    const lenis = new Lenis({
      duration: 1.2,
      easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
      smoothWheel: true,
    });
    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
    requestAnimationFrame(raf);
    document.documentElement.classList.add('lenis-smooth');

    const params = new URLSearchParams(window.location.search);
    const chapterId = params.get('id');

    fetch('data.json')
      .then(r => r.json())
      .then(data => {
        const chapter = (data.insights || []).find(c => c.id === chapterId);
        if (!chapter) {
          document.getElementById('content').innerHTML = `
            <div style="padding: 200px 40px; text-align: center;">
              <p style="font-family: var(--kr); color: var(--muted-2); margin-bottom: 24px;">챕터를 찾을 수 없습니다.</p>
              <a href="insight.html" style="font-family: var(--kr); color: var(--ink); text-decoration: underline;">← 인사이트 목록으로</a>
            </div>
          `;
          return;
        }
        document.title = `${chapter.title} — Font Insight`;
        renderChapter(chapter, data);
      })
      .catch(err => console.error(err));

    function renderChapter(c, data) {
      const num = c.number || 'CH.??';
      const useImage = c.coverImage && c.coverImage.trim();
      const hasBody = c.body && c.body.trim();

      // Cover section only shown when image exists
      const coverSection = useImage ? `
        <section class="cover-section reveal">
          <div class="cover-image">
            <img src="${c.coverImage}" alt="${c.title}">
          </div>
        </section>
      ` : '';

      // If no image AND no body, show text fallback as cover
      const fallbackCover = (!useImage && !hasBody) ? `
        <section class="cover-section reveal">
          <div class="cover-image">
            <div class="cover-fallback">
              <div>F O N T &nbsp; I N S I G H T &nbsp; / &nbsp; ${num}</div>
              <div class="big kr">${c.title || ''}</div>
              <div>@thisispearway · 2026</div>
            </div>
          </div>
        </section>
      ` : '';

      const hasPdf = c.pdfFile && c.pdfFile.trim();
      const downloadButton = hasPdf
        ? `<a href="${c.pdfFile}" class="download-button" download>
            <span>PDF 다운로드</span>
            <span class="arrow">↓</span>
          </a>`
        : `<button class="download-button disabled">
            <span>준비 중</span>
            <span class="arrow">·</span>
          </button>`;

      // Other chapters
      const others = (data.insights || []).filter(x => x.id !== c.id && !x.coming).slice(0, 3);
      const othersHTML = others.length > 0 ? `
        <section class="other-chapters">
          <h3 class="kr">다른 노트도 보기</h3>
          <div class="other-list">
            ${others.map(o => `
              <a href="insight-detail.html?id=${o.id}" class="other-item">
                <div class="other-num">${o.number || ''}</div>
                <div class="other-title kr">${o.title || ''}</div>
                <div class="other-arrow">READ ↗</div>
              </a>
            `).join('')}
          </div>
        </section>
      ` : '';

      // Body content
      const bodyHTML = c.body ? `
        <section class="body-content">
          ${c.body}
        </section>
      ` : '';

      document.getElementById('content').innerHTML = `
        <header class="detail-header">
          <div class="breadcrumb">
            <a href="index.html">PEAR TYPE FOUNDRY</a>
            <span>/</span>
            <a href="insight.html">FONT INSIGHT</a>
            <span>/</span>
            <span>${num}</span>
          </div>

          <div class="chapter-tag reveal">F O N T &nbsp; I N S I G H T &nbsp; / &nbsp; ${num}</div>
          <h1 class="detail-title kr reveal">${c.title || ''}</h1>
          <p class="detail-subtitle kr reveal reveal-delay-1">${c.subtitle || ''}</p>

          <div class="detail-meta reveal reveal-delay-2">
            ${c.date ? `<span>${c.date}</span>` : ''}
            ${c.pages ? `<span>${c.pages} PAGES</span>` : ''}
            ${c.format ? `<span>${c.format}</span>` : ''}
          </div>
        </header>

        ${coverSection}
        ${fallbackCover}

        ${bodyHTML}

        <section class="download-section">
          <div class="download-content">
            <div>
              <div class="download-tag">— DOWNLOAD</div>
              <h2 class="download-statement kr">
                전체 노트를<br>
                <span class="accent">PDF로 받아보세요.</span>
              </h2>
            </div>
            <div class="download-action">
              <div class="download-meta">${num} · ${c.title || ''}${c.pages ? ' · ' + c.pages + ' pages' : ''}</div>
              ${downloadButton}
            </div>
          </div>
        </section>

        ${othersHTML}
      `;

      // Footer
      document.getElementById('footerTag').textContent = data.site.tagline;

      const bizName = data.site.businessName || 'PEAR TYPE FOUNDRY';
      const bizTag = data.site.businessTag || '';
      const bizAddress = data.site.businessAddress || 'SEOUL, KR';
      const bizCEO = data.site.businessCEO || '';
      const bizReg = data.site.businessReg || '';
      const year = new Date().getFullYear();

      const line1 = `© ${year} ${bizName}${bizTag ? ' · ' + bizTag : ''}`;
      const line2 = bizAddress;
      const line3 = [
        bizCEO ? `CEO ${bizCEO}` : '',
        bizReg ? `BIZ REG. ${bizReg}` : ''
      ].filter(Boolean).join(' · ');

      document.getElementById('footerBusiness').innerHTML = [line1, line2, line3].filter(Boolean).join('<br>');

      const footerFonts = document.getElementById('footerFonts');
      footerFonts.innerHTML = (data.fonts || [])
        .filter(f => !f.coming)
        .map(f => `<li><a href="font.html?id=${f.id}">${f.name}</a></li>`)
        .join('') + `<li><a href="index.html#type">전체 보기 ↗</a></li>`;

      const footerConnect = document.getElementById('footerConnect');
      footerConnect.innerHTML = `
        <li><a href="mailto:${data.site.email}">Email</a></li>
        ${data.site.instagram ? `<li><a href="${data.site.instagram}" target="_blank" rel="noopener">Instagram</a></li>` : ''}
        ${data.site.noonnu ? `<li><a href="${data.site.noonnu}" target="_blank" rel="noopener">눈누마켓</a></li>` : ''}
      `;

      initScrollReveal();
    }

    function initScrollReveal() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add('visible');
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -80px 0px' });
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }
  </script>

</body>
</html>
